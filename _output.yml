bookdown::gitbook:
  css: style.css
  config:
    toc:
      before: |
        <li><a href="./">R 프로그래밍</a></li>
    toolbar:
      position: fixed
    includes:
      in_header: |
        <script src="toc.js"></script>

bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes

bookdown::epub_book: default

